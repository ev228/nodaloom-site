<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="Tesyra spine">
  <title>Tesyra spine</title>
  <desc>The spine of an outline: a vertical thread with four horizontal sections cascading from left to right at decreasing lengths, returning to a full section.</desc>
  <rect x="0" y="0" width="96" height="96" rx="6" fill="#1A6B5A"></rect>
  <g fill="none" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round">
    <line x1="22" y1="20" x2="22" y2="76"></line>
    <line x1="22" y1="28" x2="74" y2="28"></line>
    <line x1="22" y1="44" x2="62" y2="44"></line>
    <line x1="22" y1="60" x2="50" y2="60"></line>
    <line x1="22" y1="76" x2="74" y2="76"></line>
  </g>
</svg>